openapi: 3.0.0
info:
  title: TaskBoard API
  version: 1.0.0
  description: Task management API with pagination and status grouping

servers:
  - url: https://taskboard-api-h78m.onrender.com

paths:
  /tasks:
    get:
      summary: Get all tasks (paginated & grouped)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Successful response

    post:
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                userid:
                  type: string
      responses:
        "201":
          description: Task created
        "400":
          description: Title is required

  /tasks/{id}:
    patch:
      summary: Update task status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - todo
                    - in-progress
                    - done
      responses:
        "200":
          description: Updated successfully
        "400":
          description: Invalid status
        "404":
          description: Task not found

    delete:
      summary: Delete a task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Task not found
